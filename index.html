<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>एवी क्लासरूम - लाइव सुरक्षित कक्षा</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #1e1e24; color: #fff; height: 100vh; overflow: hidden; }
        
        #gateway-screen { position: fixed; top:0; left:0; width:100%; height:100%; background:#111215; display:flex; flex-direction:column; justify-content:center; align-items:center; z-index:10000; }
        .login-box { background:#1e1e24; padding:30px; border-radius:12px; box-shadow:0 8px 24px rgba(0,0,0,0.5); text-align:center; max-width:360px; width:90%; }
        .login-box h2 { margin-bottom:20px; color:#4caf50; }
        .login-box input { width:100%; padding:12px; margin-bottom:15px; border:none; border-radius:6px; background:#2a2a35; color:#fff; font-size:16px; text-align:center; }
        .login-box button { width:100%; padding:12px; border:none; border-radius:6px; background:#4caf50; color:#fff; font-size:16px; font-weight:bold; cursor:pointer; }
        
        #classroom-interface { display: none; height: 100vh; flex-direction: column; }
        
        .toolbar { background: #2a2a35; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #3e3e4f; }
        .toolbar h1 { font-size: 20px; color: #4caf50; }
        .btn-group { display: flex; gap: 10px; }
        .btn { padding: 8px 16px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: #fff; background: #444454; }
        .btn-danger { background: #f44336; }
        .btn-success { background: #4caf50; }

        .main-container { display: flex; flex: 1; height: calc(100vh - 60px); overflow: hidden; }
        .video-sidebar { width: 300px; background: #141419; padding: 15px; display: flex; flex-direction: column; gap: 15px; border-right: 2px solid #2a2a35; }
        .video-box { background: #222; border-radius: 10px; overflow: hidden; position: relative; height: 200px; border: 2px solid #333; }
        video { width: 100%; height: 100%; object-fit: cover; background: #000; }
        .video-label { position: absolute; bottom: 8px; left: 8px; background: rgba(0,0,0,0.6); padding: 2px 8px; border-radius: 4px; font-size: 12px; }
        
        .board-area { flex: 1; background: #fff; position: relative; display: flex; justify-content: center; align-items: center; }
        canvas { background: #fff; width: 100%; height: 100%; cursor: crosshair; }
    </style>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/simple-peer/9.11.1/simplepeer.min.js"></script>
</head>
<body>

    <div id="gateway-screen">
        <div class="login-box">
            <h2>एवी क्लासरूम</h2>
            <p style="margin-bottom: 15px; color: #aaa;">कक्षा में शामिल होने के लिए पासवर्ड दर्ज करें</p>
            <input type="password" id="classroom-password" placeholder="पासवर्ड यहाँ लिखें">
            <button onclick="enterClassroom()">प्रवेश करें</button>
            <p id="error-msg" style="color: #f44336; margin-top: 10px; font-size: 14px;"></p>
        </div>
    </div>

    <div id="classroom-interface">
        <div class="toolbar">
            <h1>🏫 AV-Classroom (Live)</h1>
            <div class="btn-group">
                <button class="btn btn-success" id="share-btn" onclick="startCall()">कैमरा चालू करें</button>
                <button class="btn" onclick="clearCanvas()">बोर्ड साफ करें</button>
                <button class="btn btn-danger" onclick="location.reload()">क्लास छोड़ें</button>
            </div>
        </div>

        <div class="main-container">
            <div class="video-sidebar">
                <div class="video-box">
                    <video id="localVideo" autoplay playsinline muted></video>
                    <div class="video-label">आपकी लाइव स्ट्रीम</div>
                </div>
                <div class="video-box">
                    <video id="remoteVideo" autoplay playsinline></video>
                    <div class="video-label">सामने वाले की स्ट्रीम</div>
                </div>
            </div>

            <div class="board-area">
                <canvas id="whiteboard"></canvas>
            </div>
        </div>
    </div>

    <script>
        // आपकी एकदम नई लाइव लिंक यहाँ ऑटो-कनेक्ट के लिए फिक्स कर दी गई है
        const socket = io('https://av-classroom-ye0v.onrender.com');
        
        let localStream;
        let peer;
        const canvas = document.getElementById('whiteboard');
        const ctx = canvas.getContext('2d');
        let drawing = false;

        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
            ctx.lineCap = 'round';
            ctx.lineWidth = 3;
            ctx.strokeStyle = '#000000';
        }
        window.addEventListener('resize', resizeCanvas);

        function enterClassroom() {
            const passInput = document.getElementById('classroom-password').value;
            socket.emit('verify-password', passInput, (response) => {
                if (response.success) {
                    document.getElementById('gateway-screen').style.display = 'none';
                    document.getElementById('classroom-interface').style.display = 'flex';
                    resizeCanvas();
                    setupCamera();
                } else {
                    document.getElementById('error-msg').innerText = response.message;
                }
            });
        }

        async function setupCamera() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('localVideo').srcObject = localStream;
            } catch (err) {
                console.error("कैमरा एक्सेस एरर:", err);
                alert("कृपया कैमरा और माइक की परमिशन Allow करें।");
            }
        }

        function startCall() {
            peer = new SimplePeer({
                initiator: true,
                trickle: false,
                stream: localStream
            });

            peer.on('signal', data => {
                socket.emit('signal', { signal: data });
            });

            peer.on('stream', stream => {
                document.getElementById('remoteVideo').srcObject = stream;
            });
        }

        socket.on('signal', data => {
            if (!peer) {
                peer = new SimplePeer({
                    initiator: false,
                    trickle: false,
                    stream: localStream
                });

                peer.on('signal', signalData => {
                    socket.emit('signal', { signal: signalData });
                });

                peer.on('stream', stream => {
                    document.getElementById('remoteVideo').srcObject = stream;
                });
            }
            peer.signal(data.signal);
        });

        canvas.addEventListener('mousedown', () => drawing = true);
        canvas.addEventListener('mouseup', () => { drawing = false; ctx.beginPath(); });
        canvas.addEventListener('mousemove', draw);

        function draw(e) {
            if (!drawing) return;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x, y);

            socket.emit('draw', { x, y, drawing: true });
        }

        socket.on('draw', (data) => {
            ctx.lineTo(data.x, data.y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(data.x, data.y);
        });

        socket.on('whiteboard-history', (history) => {
            history.forEach(data => {
                ctx.lineTo(data.x, data.y);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(data.x, data.y);
            });
        });

        function clearCanvas() {
            socket.emit('clear-board');
        }
        socket.on('clear-board', () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        });
    </script>
</body>
</html>
